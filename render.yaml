# LastLink — Render Blueprint (investor demo).
# Single-origin: the Node web service builds the SPA and the Express API serves it,
# so app + API + /graphql share one URL (first-party cookies). Hasura runs as a
# private service pointed at Neon. Set secret env vars (sync:false) in the dashboard.
#
# Deploy: Render dashboard → New → Blueprint → connect ahmedkhan25/lastlink.
services:
  # ── Web: Express API + built registrant SPA ──────────────────────────────
  - type: web
    name: lastlink-web
    runtime: node
    region: virginia            # close to Neon (aws-us-east-1)
    plan: starter               # free tier cold-starts; starter keeps it warm
    # 'corepack pnpm' runs pnpm directly (no 'corepack enable' — that fails on
    # Render's read-only /usr/bin).
    # No NODE_ENV=production at build (it makes pnpm skip devDeps like vite/tsc).
    # --force recreates node_modules, busting Render's restored prod-only cache.
    buildCommand: corepack pnpm install --force && corepack pnpm -F @lastlink/app build
    startCommand: corepack pnpm -F @lastlink/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: PORT
        value: "10000"
      # API → Hasura. Public URL (admin-secret-gated; introspection/console off) —
      # Render's private DNS between ungrouped web services didn't resolve.
      - key: HASURA_GRAPHQL_ENDPOINT
        value: https://lastlink-hasura.onrender.com/v1/graphql
      # Email links point at the deployed advocate/message surfaces.
      - key: ADVOCATE_BASE_URL
        value: https://lastlink-advocate.onrender.com
      - key: MESSAGE_BASE_URL
        value: https://lastlink-message.onrender.com
      # Resend sender — MUST be an address on a domain verified in Resend.
      # The verified domain is lastlink.care (resend.com/domains). Without this,
      # the API falls back to onboarding@resend.dev, which can only deliver to
      # the account owner. See docs/EMAIL-prod-not-sending.md.
      - key: RESEND_FROM
        value: LastLink <notify@lastlink.care>
      # DEMO ONLY — shortens the mandatory 24h safety hold to 2 minutes so the
      # advocate flow can be demoed end to end. REMOVE for production (the real
      # hold is 24h; unset falls back to that default).
      - key: HOLD_DURATION_MS
        value: "120000"
      # Advocate re-entry surface — the registrant app links to it ("I'm an advocate").
      - key: VITE_ADVOCATE_URL
        value: https://lastlink-advocate.onrender.com
      # DEMO ONLY — enables the "Reset demo" button (VITE_DEMO) and its endpoint
      # (DEMO_RESET), which resurrect a registrant to re-run the flow. REMOVE for prod.
      - key: VITE_DEMO
        value: "true"
      - key: DEMO_RESET
        value: "true"
      - fromGroup: lastlink

  # ── Advocate accept surface (static SPA, token-based → no cookies) ────────
  - type: web
    name: lastlink-advocate
    runtime: static
    buildCommand: corepack pnpm install && corepack pnpm -F @lastlink/advocate build
    staticPublishPath: apps/advocate/dist
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_URL
        value: https://lastlink-web.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # ── Recipient message surface (static SPA, token-based → no cookies) ─────
  - type: web
    name: lastlink-message
    runtime: static
    buildCommand: corepack pnpm install && corepack pnpm -F @lastlink/message build
    staticPublishPath: apps/message/dist
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_URL
        value: https://lastlink-web.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # ── Public memorial surface (static SPA; public, indexable) ──────────────
  - type: web
    name: lastlink-memorial
    runtime: static
    buildCommand: corepack pnpm install && corepack pnpm -F @lastlink/memorial build
    staticPublishPath: apps/memorial/dist
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_URL
        value: https://lastlink-web.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # ── Marketing site (static; public homepage) ─────────────────────────────
  - type: web
    name: lastlink-marketing
    runtime: static
    buildCommand: corepack pnpm install && corepack pnpm -F @lastlink/marketing build
    staticPublishPath: apps/marketing/dist
    envVars:
      - key: NODE_VERSION
        value: "24"
      # CTAs ("Begin your LastLink") point at the registrant app.
      - key: VITE_APP_URL
        value: https://lastlink-web.onrender.com
      # "I'm an advocate" points at the advocate re-entry surface.
      - key: VITE_ADVOCATE_URL
        value: https://lastlink-advocate.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # ── Hasura GraphQL engine (private; console + introspection off) ──────────
  - type: web
    name: lastlink-hasura
    runtime: image
    region: virginia
    plan: starter
    image:
      url: hasura/graphql-engine:v2.48.0
    envVars:
      - key: PORT
        value: "8080"            # Hasura binds 8080; match Render's health check + internal hostname
      - key: HASURA_GRAPHQL_ENABLE_CONSOLE
        value: "false"
      - key: HASURA_GRAPHQL_DEV_MODE
        value: "false"
      - key: HASURA_GRAPHQL_ENABLE_TELEMETRY
        value: "false"
      - key: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
        value: anonymous
      # Pulls the whole group: provides HASURA_GRAPHQL_DATABASE_URL,
      # HASURA_GRAPHQL_METADATA_DATABASE_URL, HASURA_GRAPHQL_ADMIN_SECRET
      # (other group keys are set but unused here — harmless).
      - fromGroup: lastlink

# ── Shared secrets (set values in the Render dashboard; never commit them) ──
envVarGroups:
  - name: lastlink
    envVars:
      - key: DATABASE_URL
        sync: false               # Neon pooled
      - key: DATABASE_URL_DIRECT
        sync: false               # Neon direct (also Hasura's DB url)
      - key: HASURA_GRAPHQL_DATABASE_URL
        sync: false               # paste the Neon direct url here too
      - key: HASURA_GRAPHQL_METADATA_DATABASE_URL
        sync: false
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: LETTER_ENC_KEY
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false
      - key: MUX_SIGNING_KEY_ID
        sync: false
      - key: MUX_SIGNING_KEY_PRIVATE
        sync: false
      - key: MUX_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
