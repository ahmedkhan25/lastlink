<title>LastLink — new-feature mocks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bone:#FAF7F1;--bone-soft:#FCFAF6;--ivory:#FEFCF8;--sand:#EFE7D5;--sand-soft:#F5EFE0;
    --ink:#1F1814;--ink-2:#44362C;--ink-3:#7C6A5B;--ink-4:#B8A896;
    --line:rgba(31,24,20,0.10);--line-soft:rgba(31,24,20,0.05);
    --brand-purple:#6B2CB0;--brand-blue:#2E73DC;
    --brand-grad:linear-gradient(135deg,#6B2CB0 0%,#2E73DC 100%);
    --brand-grad-soft:linear-gradient(135deg,rgba(107,44,176,0.10) 0%,rgba(46,115,220,0.10) 100%);
    --ok:#2F7A55;--warn:#C0782A;--err:#9A3A2E;
    --font-sans:"DM Sans",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --font-serif:"Cormorant Garamond","Source Serif Pro",Georgia,serif;
    --font-mono:"JetBrains Mono","SF Mono",ui-monospace,monospace;
    --r-2:8px;--r-3:12px;--r-4:18px;--r-pill:999px;
    --shadow-1:0 1px 2px rgba(31,24,20,0.03),0 1px 1px rgba(31,24,20,0.02);
    --shadow-2:0 4px 14px rgba(31,24,20,0.05),0 1px 2px rgba(31,24,20,0.03);
    --shadow-3:0 24px 50px -16px rgba(31,24,20,0.16),0 8px 20px rgba(31,24,20,0.05);
    --bg:var(--bone);--surface:#FFFFFF;--surface-2:var(--bone-soft);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#14110E;--surface:#1C1813;--surface-2:#25201A;
    --ink:#F4ECDD;--ink-2:#CDBFAB;--ink-3:#918172;--ink-4:#5E5448;
    --line:rgba(244,236,221,0.10);--line-soft:rgba(244,236,221,0.05);
    --brand-purple:#A87BE0;--brand-blue:#6FA8F5;
    --shadow-2:0 4px 14px rgba(0,0,0,0.35);--shadow-3:0 24px 50px -16px rgba(0,0,0,0.6);
  }}
  :root[data-theme="light"]{--bg:var(--bone);--surface:#FFFFFF;--surface-2:var(--bone-soft);
    --ink:#1F1814;--ink-2:#44362C;--ink-3:#7C6A5B;--ink-4:#B8A896;
    --line:rgba(31,24,20,0.10);--line-soft:rgba(31,24,20,0.05);--brand-purple:#6B2CB0;--brand-blue:#2E73DC;}
  :root[data-theme="dark"]{--bg:#14110E;--surface:#1C1813;--surface-2:#25201A;
    --ink:#F4ECDD;--ink-2:#CDBFAB;--ink-3:#918172;--ink-4:#5E5448;
    --line:rgba(244,236,221,0.10);--line-soft:rgba(244,236,221,0.05);--brand-purple:#A87BE0;--brand-blue:#6FA8F5;
    --shadow-2:0 4px 14px rgba(0,0,0,0.35);--shadow-3:0 24px 50px -16px rgba(0,0,0,0.6);}

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  .serif{font-family:var(--font-serif)}
  .mono{font-family:var(--font-mono);letter-spacing:0.14em;text-transform:uppercase}
  h1,h2,h3{margin:0}
  button{font:inherit}

  .layout{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
  /* ---- gallery TOC sidebar ---- */
  .toc{background:var(--surface-2);border-right:1px solid var(--line);padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}
  .toc .brand{display:flex;align-items:center;gap:9px;font-family:var(--font-serif);font-size:19px;font-weight:600;padding:0 8px 4px}
  .wing{width:24px;height:24px}
  .toc .kicker{font-size:10px;color:var(--ink-3);padding:0 8px 16px;letter-spacing:0.14em}
  .toc .grp{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.16em;color:var(--ink-4);text-transform:uppercase;padding:16px 8px 6px}
  .toc a{display:flex;gap:9px;align-items:center;text-decoration:none;color:var(--ink-2);padding:8px 10px;border-radius:var(--r-2);font-size:13.5px;cursor:pointer}
  .toc a .num{font-family:var(--font-mono);font-size:10px;color:var(--ink-4);width:16px}
  .toc a:hover{background:var(--line-soft)}
  .toc a.on{background:var(--brand-grad-soft);color:var(--ink);font-weight:500}
  .toc .themebtn{margin:18px 8px 0;font-size:12px;color:var(--ink-3);background:none;border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 12px;cursor:pointer;width:calc(100% - 16px)}

  .stage{background:var(--bg);min-width:0}
  .screen{display:none}.screen.on{display:block}

  /* ---- simulated registrant app shell ---- */
  .app{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
  .app-nav{background:var(--surface);border-right:1px solid var(--line);padding:20px 12px}
  .app-nav .b{display:flex;align-items:center;gap:8px;font-family:var(--font-serif);font-size:17px;font-weight:600;padding:0 8px 18px}
  .app-nav a{display:flex;gap:10px;align-items:center;color:var(--ink-3);text-decoration:none;padding:9px 10px;border-radius:var(--r-2);font-size:14px;margin-bottom:2px}
  .app-nav a.on{background:var(--brand-grad-soft);color:var(--ink);font-weight:500}
  .app-main{padding:38px 44px;max-width:940px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:0.14em}
  .h-title{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.02em;font-size:44px;line-height:1.05;margin:8px 0 0}
  .h-sub{color:var(--ink-3);font-size:15px;margin:10px 0 0;max-width:60ch}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-3);box-shadow:var(--shadow-1)}
  .btn{font-weight:500;cursor:pointer;border-radius:var(--r-pill);padding:10px 18px;border:1px solid transparent}
  .btn.primary{background:var(--brand-grad);color:#fff;box-shadow:var(--shadow-2)}
  .btn.ghost{background:transparent;border-color:var(--line);color:var(--ink)}
  .btn.sm{padding:6px 13px;font-size:13px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;padding:4px 10px;border-radius:var(--r-pill);text-transform:uppercase}
  .pill.warn{background:rgba(192,120,42,0.14);color:var(--warn)}
  .pill.ok{background:rgba(47,122,85,0.14);color:var(--ok)}
  .pill.mut{background:var(--line-soft);color:var(--ink-3)}
  .inp{width:100%;font:inherit;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-2);padding:10px 12px}
  .inp:focus{outline:2px solid var(--brand-blue);outline-offset:1px}
  .fld .mono{font-size:10px;color:var(--ink-3);display:block;margin-bottom:6px}
  .row{display:flex;gap:12px;align-items:center}
  .between{display:flex;align-items:center;justify-content:space-between;gap:14px}
  .ic{width:40px;height:40px;border-radius:var(--r-2);background:var(--brand-grad-soft);display:grid;place-items:center;color:var(--brand-purple);flex:0 0 auto}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.12em;color:var(--ink-3);text-transform:uppercase;padding:0 12px 10px}
  td{padding:12px;border-top:1px solid var(--line);font-size:14px;vertical-align:middle}
  .muted{color:var(--ink-3)}
  .flag{display:inline-flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--ink-3);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-2);padding:10px 12px;margin-top:18px}

  @media(max-width:900px){.layout{grid-template-columns:1fr}.toc{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}
    .app{grid-template-columns:1fr}.app-nav{display:none}.app-main{padding:24px}}
</style>
<script>
  const svg=(p,extra="")=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" ${extra}>${p}</svg>`;
  const I={
    home:svg('<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>'),
    mail:svg('<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>'),
    users:svg('<circle cx="9" cy="8" r="3.5"/><path d="M2 20c0-3.5 3-5 7-5s7 1.5 7 5"/><path d="M17 5a3 3 0 010 6"/>'),
    shield:svg('<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/>'),
    candle:svg('<path d="M10 8h4v11h-4z"/><path d="M12 3c1.5 1.5 1.5 3 0 4.5C10.5 6 10.5 4.5 12 3z"/>'),
    settings:svg('<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>'),
    user:svg('<circle cx="12" cy="9" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>'),
    check:svg('<path d="M4 12l5 5L20 6"/>'),
    eye:svg('<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'),
    plus:svg('<path d="M12 5v14M5 12h14"/>'),
    grid:svg('<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>'),
    file:svg('<path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/>'),
    google:svg('<path d="M21 12.2c0-.7-.06-1.2-.2-1.8H12v3.4h5.1c-.1.9-.7 2.2-1.9 3.1l-.02.1 2.8 2.1.2.02C19.9 17.5 21 15.1 21 12.2z" fill="currentColor" stroke="none"/><path d="M12 21c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.1-3.8l-.1.01-3 2.3-.03.1C5.3 19 8.4 21 12 21z" fill="currentColor" stroke="none"/><path d="M6.9 13.7c-.2-.6-.3-1.1-.3-1.7s.1-1.2.3-1.7l-.001-.1-3-2.3-.1.05A9 9 0 003 12a9 9 0 00.9 3.9z" fill="currentColor" stroke="none"/><path d="M12 6.6c1.7 0 2.8.7 3.5 1.3l2.5-2.5C16.5 3.9 14.4 3 12 3 8.4 3 5.3 5 3.8 8l3.1 2.4C7.6 8.2 9.6 6.6 12 6.6z" fill="currentColor" stroke="none"/>'),
    apple:svg('<path d="M16 13c0-2 1.6-3 1.7-3.1-1-1.4-2.4-1.6-2.9-1.6-1.2-.1-2.4.7-3 .7-.6 0-1.6-.7-2.6-.7-1.3 0-2.6.8-3.2 2-1.4 2.4-.4 6 1 8 .6.9 1.4 2 2.4 1.9.9 0 1.3-.6 2.4-.6s1.4.6 2.4.6c1 0 1.6-.9 2.2-1.8.7-1 1-2 1-2.1-.1 0-2-.8-2-3z" fill="currentColor" stroke="none"/><path d="M14 6c.6-.7.9-1.6.8-2.5-.8 0-1.7.5-2.3 1.2-.5.6-.9 1.5-.8 2.4.9.1 1.7-.4 2.3-1.1z" fill="currentColor" stroke="none"/>'),
    copy:svg('<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h8"/>'),
    upload:svg('<path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 20h16"/>'),
    x:svg('<path d="M6 6l12 12M18 6L6 18"/>'),
    heart:svg('<path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/>'),
    play:svg('<circle cx="12" cy="12" r="9"/><path d="M10 8l6 4-6 4z"/>'),
    sparkle:svg('<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/>'),
    clock:svg('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'),
    video:svg('<rect x="3" y="6" width="12" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3z"/>'),
    lock:svg('<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/>'),
    fingerprint:svg('<path d="M12 11v3M8 12a4 4 0 018 0v2a6 6 0 01-1 3M6 13a6 6 0 0112 0M9 18a8 8 0 00.5-4"/>'),
  };
</script>

<div class="layout">
  <aside class="toc">
    <div class="brand">
      <svg class="wing" viewBox="0 0 32 32"><path d="M16 6c-3 6-8 6-11 4 0 6 5 10 11 12 6-2 11-6 11-12-3 2-8 2-11-4z" fill="url(#g)"/><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop offset="0" stop-color="#6B2CB0"/><stop offset="1" stop-color="#2E73DC"/></linearGradient></defs></svg>
      LastLink
    </div>
    <div class="mono kicker">New-feature mocks</div>
    <nav id="nav"></nav>
    <button class="themebtn" id="themeBtn" type="button">Toggle light / dark</button>
  </aside>

  <main class="stage" id="stage"></main>
</div>

<script>
/* ---------- screen registry (this list IS the table of contents) ---------- */
const SCREENS=[
  {id:"overview", grp:"Plan", num:"", label:"Overview & TOC", icon:"grid"},
  {id:"demopath", grp:"Plan", num:"", label:"Investor demo path", icon:"play", gap:"full workflow · real vs mock"},
  {id:"onboarding", grp:"Onboarding", num:"", label:"Onboarding (enhanced)", icon:"sparkle", gap:"adds consent · avatar · import"},
  {id:"memorial", grp:"Public surface (new app)", num:"1", label:"Memorial + condolences", icon:"candle", gap:"GAP 1+2 · deferred post-MVP"},
  {id:"moderation", grp:"Registrant app", num:"3", label:"Condolence moderation", icon:"eye", gap:"GAP 3 · absent"},
  {id:"import", grp:"Registrant app", num:"6", label:"Import contacts", icon:"users", gap:"GAP 6 · Google absent, CSV planned"},
  {id:"renewal", grp:"Registrant app", num:"4", label:"Memorial settings & renewal", icon:"settings", gap:"GAP 4 · absent"},
  {id:"billing", grp:"Registrant app", num:"5", label:"Plan & billing", icon:"shield", gap:"GAP 5 · planned, unbuilt"},
  {id:"profile", grp:"Registrant app", num:"7", label:"Profile & avatar", icon:"user", gap:"GAP 7b · absent"},
  {id:"signin", grp:"Auth", num:"7a", label:"Sign in (social)", icon:"user", gap:"GAP 7a · email/pw only today"},
];

/* app shell for registrant screens */
function shell(active, inner){
  const nav=[["home","Dashboard",0],["mail","Messages",0],["users","Contacts",active==="import"],
    ["shield","Advocates",0],["candle","Memorial",active==="renewal"||active==="moderation"],["settings","Account",active==="billing"||active==="profile"]];
  return `<div class="app"><nav class="app-nav">
    <div class="b"><svg class="wing" viewBox="0 0 32 32"><use href="#g"/><path d="M16 6c-3 6-8 6-11 4 0 6 5 10 11 12 6-2 11-6 11-12-3 2-8 2-11-4z" fill="url(#g)"/></svg>LastLink</div>
    ${nav.map(([ic,l,on])=>`<a class="${on?'on':''}">${I[ic]||''}<span>${l}</span></a>`).join("")}
  </nav><div class="app-main">${inner}</div></div>`;
}
function head(eyebrow,title,sub){return `<div class="eyebrow">${eyebrow}</div><h1 class="h-title">${title}</h1>${sub?`<p class="h-sub">${sub}</p>`:""}`;}

/* ---------------- screen bodies ---------------- */
const BODY={};

BODY.overview=()=>`<div style="padding:56px 60px;max-width:960px">
  <div class="eyebrow">LastLink · Ruby → new platform</div>
  <h1 class="serif" style="font-size:52px;font-weight:500;letter-spacing:-0.02em;margin:10px 0 0;line-height:1.05">New-feature mocks</h1>
  <p style="color:var(--ink-2);font-size:18px;max-width:64ch;margin:16px 0 8px;line-height:1.6">
    Seven screens for the features the 2020 Ruby app shipped that the new platform deferred or dropped —
    each built in the live design system. Presentational only; no backend, no schema changes.
    Full rationale in <span class="mono" style="font-size:12px">docs/GAP-ANALYSIS-ruby-vs-new.md</span>.</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px">
    ${SCREENS.filter(s=>s.id!=="overview").map(s=>`
      <button class="card jump" data-go="${s.id}" style="text-align:left;padding:18px 20px;cursor:pointer;display:flex;gap:14px;align-items:flex-start">
        <div class="ic">${I[s.icon]}</div>
        <div><div class="between"><div class="serif" style="font-size:20px;font-weight:500">${s.label}</div>
          <span class="mono" style="font-size:10px;color:var(--ink-4)">${s.num?"#"+s.num:""}</span></div>
          <div class="mono" style="font-size:9.5px;color:var(--ink-3);margin-top:4px">${s.gap||""}</div></div>
      </button>`).join("")}
  </div>
  <div class="flag" style="margin-top:26px">${I.check}
    <span>Build order (see doc §7.3): memorial+condolences → moderation → billing → renewal → import → profile/auth → onboarding edits. One PR per theme; each ships its key empty/populated/edge states.</span></div>
</div>`;

BODY.memorial=()=>`<div style="max-width:1000px;margin:0 auto;padding:34px 40px">
  ${head("GAP 1+2 · public memorial surface","In memory of Daniel Rourke","Public, shareable page — the one artifact a grieving family links to. Private letters/videos still reach people directly and are not shown here.")}
  <div class="row" style="gap:26px;margin-top:26px;align-items:flex-start;flex-wrap:wrap">
    <div class="card" style="width:150px;height:184px;display:grid;place-items:center;color:var(--ink-4)">${I.user.replace('18','54').replace('18','54')}</div>
    <div style="flex:1;min-width:240px">
      <div class="serif" style="font-size:58px;font-weight:500;letter-spacing:-0.02em;line-height:1.02">Daniel Rourke</div>
      <div class="serif" style="font-style:italic;font-size:22px;color:var(--ink-3);margin-top:4px">1962 — 2026</div>
      <p class="serif" style="font-style:italic;font-size:26px;color:var(--ink);max-width:22ch;margin:18px 0 0;line-height:1.35">“Be kind. It costs nothing, and it outlives you.”</p>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 320px;gap:28px;margin-top:34px;align-items:start">
    <div>
      <div class="mono" style="font-size:10px;color:var(--ink-3);margin-bottom:8px">Their story</div>
      <p style="color:var(--ink-2);font-size:17px;line-height:1.7;max-width:60ch;margin:0 0 22px">He built things with his hands and made everyone feel like the most interesting person in the room. He loved terrible puns, strong coffee, and his family — roughly in reverse order, though he'd never admit it.</p>
      <div class="mono" style="font-size:10px;color:var(--ink-3);margin:0 0 10px">Condolences · approved by the family</div>
      ${[["Sarah Chen","Colleague","He was the kindest man I ever worked with. I still hear his voice when I measure twice."],["Michael Rivera","Neighbour","Thinking of the whole family. He talked about you all constantly."]].map(([n,r,m])=>`
        <div class="card" style="padding:16px 18px;margin-bottom:12px"><div class="between"><span class="serif" style="font-size:18px;font-weight:500">${n}</span><span class="mono" style="font-size:9.5px;color:var(--ink-3)">2 days ago</span></div><div class="muted" style="font-size:12px">${r}</div><p style="margin:8px 0 0;color:var(--ink-2)">${m}</p></div>`).join("")}
    </div>
    <div>
      <div class="card" style="padding:20px">
        <div class="serif" style="font-size:21px;font-weight:500">Share a memory</div>
        <p class="muted" style="font-size:13px;margin:2px 0 14px">Appears once the family approves it.</p>
        <label class="fld" style="display:block;margin-bottom:12px"><span class="mono">Your name</span><input class="inp" placeholder="Sarah Chen"></label>
        <label class="fld" style="display:block;margin-bottom:14px"><span class="mono">Message</span><textarea class="inp" style="min-height:72px" placeholder="A memory, a goodbye…"></textarea></label>
        <button class="btn primary" style="width:100%">Leave your message</button>
      </div>
      <div class="card" style="padding:18px;margin-top:14px">
        <div class="mono" style="font-size:10px;color:var(--ink-3);margin-bottom:10px">Remember them</div>
        ${[["Send flowers","From €45"],["Donate to the hospice","Any amount"]].map(([t,p])=>`<div class="between" style="padding:8px 0"><span class="row" style="gap:9px">${I.heart}<span>${t}</span></span><span class="mono" style="font-size:10px;color:var(--ink-3)">${p}</span></div>`).join("")}
      </div>
    </div>
  </div>
  <div class="flag">${I.shield}<span><b style="color:var(--ink-2)">Provenance footer:</b> “Verified by two advocates · passing confirmed 11 June 2026” — carries the verification promise onto the public page. Condolences default to <b>pending/moderated</b> (the Ruby app auto-accepted — a spam hole).</span></div>
</div>`;

BODY.moderation=()=>shell("moderation",`${head("GAP 3 · condolence moderation","Condolences","Keep the memorial page gentle for the family. New notes wait here until someone approves them.")}
  <div class="row" style="gap:10px;margin:22px 0 16px"><span class="pill warn">${I.eye} 3 awaiting review</span><span class="pill ok">${I.check} 12 published</span></div>
  <div class="card" style="overflow:hidden">
    <table><thead><tr><th>From</th><th>Message</th><th>Received</th><th style="text-align:right">Review</th></tr></thead><tbody>
      ${[["Aunt Peggy","Family","From a boy who couldn't sit still to a man who held everyone together. Rest easy, Danny."],
         ["J. Whitfield","Old friend","We lost touch but never forgot. The world's quieter now."],
         ["unknown","—","Buy cheap watches at discount-deals dot biz →"]].map(([n,r,m],i)=>`

/* ---------- Investor demo path: the full workflow, real vs mock ---------- */
BODY.demopath=()=>{
  const steps=[
    ["Marketing site","Prospect reads the story, the verification model, pricing.","real","home"],
    ["Sign up","Email/password — or Continue with Google / Apple.","mock","user"],
    ["Onboarding wizard","7 quiet steps: welcome → consent → identity+photo → contacts → message → advocates → sealed.","mix","sparkle"],
    ["Dashboard","“Active & sealed.” Message list, status strip.","real","grid"],
    ["Compose a message","Record video in-browser (Mux) or write an encrypted letter.","real","video"],
    ["Add contacts","Add people, or import from Google / CSV.","mix","users"],
    ["Designate advocates","Two trusted people, slots A and B, invited.","real","shield"],
    ["Account sealed","Nothing more required — no recurring check-in.","real","lock"],
    ["— time passes —","",""," "],
    ["Advocate confirms passing","Tokenized link → identity check → confirm details. Two, independently.","real","fingerprint"],
    ["24-hour safety hold","Cancellable. LastLink tries to reach the registrant. A living person cancels instantly.","real","clock"],
    ["Release","Durable job fires, letters decrypt (KMS), tokens mint, notifications fan out.","real","mail"],
    ["Recipient opens the message","Tokenized link → the video or letter, in the sender's own words.","real","play"],
    ["Public memorial + condolences","A shareable page; loved ones leave moderated notes.","mock","candle"],
    ["Remember them / plan","Flowers, donation; registrant upgrades to Premium.","mock","heart"],
  ];
  const tag=t=>t==="real"?`<span class="pill ok">Real</span>`:t==="mock"?`<span class="pill warn">Mock</span>`:t==="mix"?`<span class="pill mut">Real + mock</span>`:"";
  return `<div style="padding:44px 56px;max-width:900px">
    ${head("For the investor demo","The full workflow, end to end","One narrated path. Real product where it's built; a mock stands in only where a feature is deferred — labelled so nothing is oversold.")}
    <div class="row" style="gap:10px;margin:20px 0 26px"><span class="pill ok">Real · shipped</span><span class="pill warn">Mock · presentational</span><span class="pill mut">Real + mock</span></div>
    <div style="display:flex;flex-direction:column;gap:0">
      ${steps.map((s,i)=>{
        if(!s[2]) return `<div style="padding:10px 0 10px 52px;color:var(--ink-4);font-style:italic" class="serif">${s[0]}</div>`;
        return `<div style="display:grid;grid-template-columns:40px 1fr;gap:14px;padding:12px 0;border-top:${i? '1px solid var(--line)':'0'}">
          <div class="ic" style="width:34px;height:34px">${I[s[3]]||I.check}</div>
          <div><div class="between"><div class="serif" style="font-size:19px;font-weight:500">${s[0]}</div>${tag(s[2])}</div>
          <div class="muted" style="font-size:14px;margin-top:2px">${s[1]}</div></div></div>`;
      }).join("")}
    </div>
    <div class="flag">${I.play}<span><b style="color:var(--ink-2)">Demo tip:</b> steps 9–13 use the verification engine's time-warp so the 24h hold plays in seconds. The two <b>mock</b> stand-ins (memorial, offerings) are the only not-fully-built surfaces on the path.</span></div>
  </div>`;
};

      ${steps.map((s,i)=>`<button class="substep pill mut" data-target="ob-${i}" style="cursor:pointer;border:1px solid var(--line)">${i+1}. ${s}</button>`).join("")}
    </div>
    ${panels.map((p,i)=>`<div class="subpanel" id="ob-${i}" ${i===1?'':'hidden'}>${chrome(i,p)}</div>`).join("")}
    <div style="padding:0 40px 34px"><div class="flag">${I.sparkle}<span>Today's wizard is 6 steps (welcome · identity · contacts · message · advocates · done). This adds a <b>consent</b> step (the Ruby app's ToS gate, now legally explicit), an <b>avatar</b>, and an <b>import</b> entry point — the four onboarding gaps from the audit. Social sign-in sits just before this, on the Sign-in screen.</span></div></div>
  </div>`;
};

/* ---------------- router ---------------- */
const nav=document.getElementById("nav"), stage=document.getElementById("stage");
let lastGrp="";
nav.innerHTML=SCREENS.map(s=>{
  const g = s.grp!==lastGrp ? `<div class="grp">${s.grp}</div>` : ""; lastGrp=s.grp;
  return `${g}<a data-id="${s.id}"><span class="num">${s.num||"·"}</span><span>${s.label}</span></a>`;
}).join("");

function go(id){
  SCREENS.forEach(s=>{});
  stage.innerHTML=`<section class="screen on">${(BODY[id]||BODY.overview)()}</section>`;
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.id===id));
  stage.scrollTop=0; window.scrollTo(0,0);
  document.querySelectorAll(".jump").forEach(b=>b.addEventListener("click",()=>go(b.dataset.go)));
  // sub-step switcher (onboarding wizard)
  const subs=Array.from(document.querySelectorAll(".substep"));
  subs.forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".subpanel").forEach(p=>p.hidden = p.id!==b.dataset.target);
    subs.forEach(x=>{x.classList.toggle("mut",x!==b); x.classList.toggle("warn",x===b);});
  }));
  location.hash=id;
}
document.querySelectorAll("#nav a").forEach(a=>a.addEventListener("click",()=>go(a.dataset.id)));
go((location.hash||"#overview").slice(1));

const root=document.documentElement;
document.getElementById("themeBtn").addEventListener("click",()=>{
  const cur=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
  root.setAttribute("data-theme",cur==="dark"?"light":"dark");
});
</script>
